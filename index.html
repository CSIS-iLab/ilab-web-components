<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <title>Testing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Vite dev server prefers the leading slash -->
    <script type="module" src="/src/dev-main.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
      }

      main {
        min-height: 80vh;
        padding: 2rem;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      csis-audio-brief {
        margin-bottom: 20px;
      }
    </style>
  </head>

  <body>
    <main>
      <csis-progress-bar height="6" fill-color="#cc0000"
        track-color="rgba(0,0,0,0.08)"></csis-progress-bar>
      <h1>Test page</h1>
      <p>
        This is just some placeholder content so we can see where the footer
        ends up on the page.
      </p>
      <div style="height: 100vh;"></div>

      <csis-media-card title="A Seal"
        background-src="water-test.mp4"
        poster-src="https://your-cdn.com/water-poster.jpg"
        image-src="seal.jpg"
        image-alt="seal on rocks" overlay-color="#081a2e"
        overlay-opacity="0.45" border-color="#d6b54c" title-color="#ffffff"
        height="420px" radius="24px" image-shape="circle"
        image-size="75%"></csis-media-card>

      <div style="height: 100vh;"></div>
    </main>
    <csis-hidden-reach-footer></csis-hidden-reach-footer>
  </body>

</html>
