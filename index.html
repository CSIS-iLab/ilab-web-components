<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <title>Testing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Vite dev server prefers the leading slash -->
    <script type="module" src="/src/dev-main.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
      }

      main {
        min-height: 80vh;
        padding: 2rem;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      csis-audio-brief {
        margin-bottom: 20px;
      }
    </style>
  </head>

  <body>
    <main>
      <csis-progress-bar height="6" fill-color="#cc0000"
        track-color="rgba(0,0,0,0.08)"></csis-progress-bar>
      <h1>Test page</h1>
      <p>
        This is just some placeholder content so we can see where the footer
        ends up on the page.
      </p>
      <div style="height: 100vh;"></div>
      <csis-media-card
        title="Internet"
        background-src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
        image-src="https://picsum.photos/400"
        image-alt="Sample image"
        width="360px"
        height="320px"
        border-width="2px"
        border-color="#d6b54c"
        image-size="80%"
        image-shape="circle"
        image-opacity="0.75"
        title-color="#ffffff"
        title-font-size="2.4rem"
        title-font-weight="700"
        title-font-style="italic"
        title-font-family="'Space Mono', monospace"
        font-url="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap"
      ></csis-media-card>
      <div style="height: 100vh;"></div>
    </main>
    <csis-hidden-reach-footer></csis-hidden-reach-footer>
  </body>

</html>
