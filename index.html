<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <title>Testing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Vite dev server prefers the leading slash -->
    <script type="module" src="/src/dev-main.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
      }

      main {
        min-height: 80vh;
        padding: 2rem;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      csis-audio-brief {
        margin-bottom: 20px;
      }
    </style>
  </head>

  <body>
    <main>
      <csis-progress-bar height="6" fill-color="#cc0000"
        track-color="rgba(0,0,0,0.08)"></csis-progress-bar>
      <h1>Test page</h1>
      <p>
        This is just some placeholder content so we can see where the footer
        ends up on the page.
      </p>
      <div style="height: 100vh;"></div>
      <h1>test</h1>
      <div class="component-wrap">
        <csis-translation-scramble top-text="政策态势及中拉合作展望。"
          bottom-text="The Policy Trajectory and Prospects for China-Latin America Cooperation"
          height="220" bg-color="#1d1e22" text-color="#a5e5d4"
          dud-color="#42c3c8" ghost-color="#d93da5" label="signal decode"
          label-color="#8e3b32" trigger-start="top 50%" speed="2"
          reveal-delay="0"></csis-translation-scramble>
      </div>

      <div style="height: 100vh;"></div>

      <csis-gsap-proof debug="true"></csis-gsap-proof>
      <h1>Test</h1>
      <div style="height: 100vh;"></div>

    </main>
    <csis-hidden-reach-footer></csis-hidden-reach-footer>
  </body>

</html>
